$fileManager = thunbar
$menu = wofi --show drun
$mainMod = SUPER
$term = kitty
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

monitor=,preferred,auto,1.2
monitor=,highres,auto,1

# Laptop Main Monitor
monitor = eDP-1, preferred, 0x0, 1

# Old DELL Vertical
monitor = HDMI-A-1, preferred, 1920x0, 1,
# monitor = desc:AOC AG273QS4R4 0x00000346, preferred, -2560x-800, 1

workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1

workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

general {
    gaps_in = 2
    gaps_out = 4

    border_size = 1

    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = rgb(ffffff)
    col.inactive_border = rgba(595959aa)

    allow_tearing = true # Stylistic choice :P
    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 2
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    # LP - look into
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
# LP - adjust or remove
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # no anime wallpaper thanks
    disable_hyprland_logo = true
}

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    repeat_rate = 50
    repeat_delay = 200

    touchpad {
        natural_scroll = true;
        scroll_factor = 0.4;
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace
# gesture = 3, down, mod: ALT, close
# LP - I GOTTA figure something out here

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, S, exec, $scriptsDir/RofiSearch.sh # Google search using rofi
bind = $mainMod ALT, V, exec, $scriptsDir/ClipManager.sh # Clipboard Manager

bind = $mainMod SHIFT, F, fullscreen # whole full screen
bind = $mainMod SHIFT, Return, exec, [float; move 15% 5%; size 70% 60%] $term # Dropdown terminal LP look into
bind = $mainMod, D, exec, pkill rofi || rofi -show drun -modi drun,filebrowser,run,window # Main Menu (APP Launcher)
bind = $mainMod, B, exec, xdg-open "https://"  # default browser
bind = $mainMod, A, exec, pkill rofi || ags -t 'overview' # desktop overview (if installed) LP look into
bind = $mainMod, Q, killactive,
bind = $mainMod, Return, exec, $term  #terminal
bind = $mainMod, V, togglefloating,
bind = $mainMod, M, exit, # LEAVE HYPRLAND LP Look into
# bind = $mainMod, Return, pseudo, 
bind = $mainMod, G, togglesplit, # dwindle
bind = CTRL ALT, L, exec, $scriptsDir/lock_screen.sh # screen lock
bind = $mainMod CTRL ALT, B, exec, pkill waybar || waybar # Toggle hide/show waybar 
bind = $mainMod, equal, exec, $scriptsDir/hypr_scale.sh up
bind = $mainMod, minus, exec, $scriptsDir/hypr_scale.sh down
bind = $mainMod, E, exec, ${pkgs.kitty}/bin/kitty ${pkgs.yazi}/bin/yazi


bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d 

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, Y, workspace, 1 # NOTE: code:10 = key 1
bind = $mainMod, U, workspace, 2 # NOTE: code:11 = key 2
bind = $mainMod, I, workspace, 3 # NOTE: code:12 = key 3
bind = $mainMod, O, workspace, 4 # NOTE: code:13 = key 4
bind = $mainMod, P, workspace, 5 # NOTE: code:14 = key 5
bind = $mainMod, code:15, workspace, 6 # NOTE: code:15 = key 6
bind = $mainMod, code:16, workspace, 7 # NOTE: code:16 = key 7
bind = $mainMod, code:17, workspace, 8 # NOTE: code:17 = key 8
bind = $mainMod, code:18, workspace, 9 # NOTE: code:18 = key 9
bind = $mainMod, code:19, workspace, 10 # NOTE: code:19 = key 0

bind = $mainMod SHIFT, Y, movetoworkspace, 1 
bind = $mainMod SHIFT, U, movetoworkspace, 2 
bind = $mainMod SHIFT, I, movetoworkspace, 3 
bind = $mainMod SHIFT, O, movetoworkspace, 4 
bind = $mainMod SHIFT, P, movetoworkspace, 5 
bind = $mainMod SHIFT, code:15, movetoworkspace, 6 
bind = $mainMod SHIFT, code:16, movetoworkspace, 7 
bind = $mainMod SHIFT, code:17, movetoworkspace, 8 
bind = $mainMod SHIFT, code:18, movetoworkspace, 9 
bind = $mainMod SHIFT, code:19, movetoworkspace, 10 
bind = $mainMod SHIFT, bracketleft, movetoworkspace, -1 
bind = $mainMod SHIFT, bracketright, movetoworkspace, +1 

bind = $mainMod CTRL, code:10, movetoworkspacesilent, 1 
bind = $mainMod CTRL, code:11, movetoworkspacesilent, 2 
bind = $mainMod CTRL, code:12, movetoworkspacesilent, 3 
bind = $mainMod CTRL, code:13, movetoworkspacesilent, 4 
bind = $mainMod CTRL, code:14, movetoworkspacesilent, 5 
bind = $mainMod CTRL, code:15, movetoworkspacesilent, 6 
bind = $mainMod CTRL, code:16, movetoworkspacesilent, 7 
bind = $mainMod CTRL, code:17, movetoworkspacesilent, 8 
bind = $mainMod CTRL, code:18, movetoworkspacesilent, 9 
bind = $mainMod CTRL, code:19, movetoworkspacesilent, 10 
bind = $mainMod CTRL, bracketleft, movetoworkspacesilent, -1 
bind = $mainMod CTRL, bracketright, movetoworkspacesilent, +1 
# Example special workspace (scratchpad)
# LP - Look into
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
# LP - Look into
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

exec-once=bash ~/.config/hypr/start.sh
