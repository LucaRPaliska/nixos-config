animations {
    animation = fadeIn, 0
    animation = fadeOut, 0
}

background {
    monitor = 
    color = rgba(0, 0, 0)
    # path = /tmp/eDP-1.png # LP - change to some glitch black background
}

background {
    monitor = eDP-1
    path = /tmp/eDP-1.png
    color = rgb(0, 0, 0)
    # blur_passes = 1
}

background {
    monitor = HDMI-A-1
    path = /tmp/HDMI-A-1.png
    color = rgb(0, 0, 0)
    # blur_passes = 1
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33 
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(ffffff)
    inner_color = rgb(000000)
    font_color = rgb(ffffff)
    rounding = 5
    fade_on_empty = false

    placeholder_text = <i>                              ...                               </i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME 
    
    color = rgba(ffffff)
    font_size = 14
    font_family = Sans
    
    position = 0, 50
    halign = center
    valign = center
}
